# Stain Development Log
# Chronological record of decisions, findings, trade-offs, and artifacts.
# Each entry is immutable once written. Append only.

- id: "001"
  date: "2026-04-09"
  title: "Multi-provider inference via litellm"
  type: decision
  context: |
    Stain makes multiple LLM calls per analysis (one per detector, scaling to 6
    detectors × N corpus files). The original Anthropic-only SDK would lock us
    into a single provider and price point. Cost and latency are multiplicative
    — every detector call compounds.
  decision: |
    Replaced the `anthropic` SDK with `litellm` for provider-agnostic inference.
    Model selection is now a single config string: "provider/model".
    Any provider with an OpenAI-compatible API works out of the box.
  trade_offs:
    - pro: "Hot-swap models in config without code changes"
    - pro: "Access to Groq LPU, Cerebras wafer-scale, OpenRouter, Together, etc."
    - pro: "litellm normalises usage/token counting across providers"
    - con: "Extra dependency (~15 transitive packages including openai SDK)"
    - con: "litellm can lag behind provider API changes"
  artifacts:
    - src/stain/detector.py
    - stain.config.yaml
    - pyproject.toml

- id: "002"
  date: "2026-04-09"
  title: "Cerebras selected as primary inference provider"
  type: decision
  context: |
    Stain's multi-detector architecture means a single analysis can issue 6+
    LLM calls. At Anthropic Haiku pricing ($0.80/M input, $4/M output) and
    ~1.7s latency per call, a full 6-detector sweep on 23 files would cost ~$2
    and take ~4 minutes. For a tool meant to run frequently during writing,
    this is too slow and too expensive.
  decision: |
    Cerebras wafer-scale inference as the default provider, using
    `cerebras/qwen-3-235b-a22b-instruct-2507` (235B parameter model).
    Groq LPU as secondary option. Anthropic retained for orchestrator tasks
    requiring highest reasoning quality.
  rationale:
    - "235B model at sub-1s latency — larger than any Groq-hosted model"
    - "No rate limit issues on paid tier (Groq free tier hit rate limits after 5 calls)"
    - "Cost ~40x cheaper than Anthropic Haiku on equivalent workloads"
    - "Qwen 3 instruction-following quality rivals Claude Haiku for structured JSON tasks"
  trade_offs:
    - pro: "23 files in 33s total (vs estimated 4+ min on Anthropic)"
    - pro: "Zero failures across full corpus"
    - con: "Cerebras model availability is limited (no 70B Llama on our tier)"
    - con: "Annotation character offsets still imperfect (80% valid rate)"
  artifacts:
    - .env
    - stain.config.yaml
    - benchmarks/cerebras_qwen235b.yaml

- id: "003"
  date: "2026-04-09"
  title: "Annotation span validation and repair"
  type: finding
  context: |
    Small models (8B) return character offsets that are actually word indices
    or line numbers. Even the 235B model produces invalid offsets ~20% of the
    time. Without validation, a UI highlighting flagged spans would point at
    completely wrong text.
  finding: |
    Added a multi-stage validation pipeline in detector.py:
    1. Bounds check (out of range, negative, start >= end)
    2. Plausibility check (span < 3 chars = probably word indices)
    3. Content check (extract quotes from explanation, verify they appear in span)
    4. Repair (search input text for quoted/verbatim phrases from explanation)
    5. Fallback phrase matching (sliding window over explanation words)
    Annotations that can't be salvaged are kept but marked `span_valid=False`.
  trade_offs:
    - pro: "Recovers correct spans from garbage offsets when explanation contains quotes"
    - pro: "Downstream consumers can filter on span_valid"
    - con: "Repair is heuristic — can't fix annotations where the model paraphrases entirely"
    - con: "Adds ~50 lines of string matching logic"
  artifacts:
    - src/stain/detector.py
    - src/stain/models.py

- id: "004"
  date: "2026-04-09"
  title: "Benchmark framework and first three-way model comparison"
  type: finding
  context: |
    Needed repeatable, content-addressed model evaluation to make data-driven
    decisions as new models arrive. Built `stain benchmark run` and
    `stain benchmark compare` commands.
  finding: |
    First formal benchmark across 23 corpus files (13 human, 10 LLM), D1 only.

    ## Scorecard — 2026-04-09

    | Metric                   | Cerebras Qwen3 235B | Groq Llama3.3 70B | Groq Llama3.1 8B |
    |--------------------------|--------------------:|------------------:|-----------------:|
    | Human score (mean)       |              0.3192 |            0.3846 |           0.5027 |
    | Human score (stdev)      |              0.0253 |            0.1676 |           0.1614 |
    | LLM score (mean)         |               0.690 |            0.7022 |           0.7086 |
    | LLM score (stdev)        |              0.0316 |            0.0067 |           0.0501 |
    | Separation               |              0.3708 |            0.3176 |           0.2059 |
    | Accuracy θ=0.50          |              100.0% |             90.9% |           55.6%  |
    | Latency mean (ms)        |               1022  |              1459 |            892   |
    | Failed                   |               0/23  |              1/23 |           5/23   |
    | Annotations valid        |                103  |                69 |             72   |
    | Annotations invalid      |                 28  |                15 |             23   |

    Key findings:
    - Qwen 235B: perfect classification at every threshold (0.40–0.60), tightest
      human scoring (stdev 0.025), zero failures
    - Groq 70B: scored two Sivers essays at 0.70 (false positives), one JSON
      parse failure
    - 8B: not viable — 55% accuracy, 5 parse failures, scores human text 0.50+
    - A threshold of θ=0.55 gives 100% accuracy on Qwen 235B
    - LLM confidence is uniformly high (0.85+) across all models; human
      confidence is correctly lower (0.60–0.70)
  artifacts:
    - results/benchmarks/20260409_053521_ed3ca8089d3f/  # Cerebras Qwen3 235B
    - results/benchmarks/20260409_053600_ba44ec731b13/  # Groq Llama3.3 70B
    - results/benchmarks/20260409_053706_a9382dc1223c/  # Groq Llama3.1 8B
    - benchmarks/cerebras_qwen235b.yaml
    - benchmarks/groq_llama70b.yaml
    - benchmarks/groq_llama8b.yaml
    - src/stain/benchmark.py
    - src/stain/cli.py

- id: "005"
  date: "2026-04-09"
  title: "Roadmap strategy: Concentric Rings"
  type: decision
  context: |
    Phase 1 POC proved the thesis (100% accuracy, 0.371 separation, sub-1s).
    Needed a roadmap from POC to battle-hardened tool. Evaluated three
    approaches: Depth First (perfect detectors then extend), Research First
    (let literature inform detector design), Concentric Rings (harden core,
    extend outward).
  decision: |
    Concentric Rings. Six rings, each independently valuable:
    1. Complete Detection Engine (D2-D6 + plugin architecture)
    2. Input & Output Hardening (stdin, URL, output modes, exit codes)
    3. Corpus Infrastructure (gold/bulk stratification, generation tooling)
    4. Discovery Pipeline (meta-LLM analysis of detector blind spots)
    5. Research Pipeline (arXiv ingestion, hypothesis extraction)
    6. Distribution & Visualization (PyPI, MCP server, HTML reports)
  rationale:
    - "Each ring ships usable improvements — no disappearing into research holes"
    - "Plugin system arrives in Ring 1, so everything after dogfoods extensibility"
    - "Research pipeline (Ring 5) lands after corpus infra (Ring 3) exists to test hypotheses"
    - "Rejected Research First because it risks Option C procrastination"
    - "Rejected Depth First because literature might invalidate detector designs"
  artifacts:
    - docs/superpowers/specs/2026-04-09-stain-roadmap-design.md

- id: "006"
  date: "2026-04-09"
  title: "Personal tool first, UX later"
  type: decision
  context: |
    Stain could target the operator (Kai) or external users (writers,
    marketers). The answer determines whether we prioritise terminal
    ergonomics or onboarding UX.
  decision: |
    Build for the operator first. Primary use case: auditing other people's
    text (clients, contractors, LinkedIn posts). Quantify what the slopodar
    detects intuitively. UX for external users deferred to Ring 6.
  rationale:
    - "Don't build onboarding for a tool that hasn't earned its operator's trust"
    - "Terminal-native, pipe-friendly, scriptable — optimise for speed of audit"
    - "All input paths: file, stdin, URL — whatever's fastest in the moment"
  artifacts:
    - docs/superpowers/specs/2026-04-09-stain-roadmap-design.md

- id: "007"
  date: "2026-04-09"
  title: "Human-in-the-loop for detector promotion"
  type: decision
  context: |
    Discovery and research pipelines will generate candidate detectors.
    Question: how autonomous should the promotion process be?
  decision: |
    Machine proposes, operator approves. Nothing enters the active detector
    suite without sign-off. Discovery agents surface hypotheses; operator
    reviews, approves, and triggers benchmark. Promotion only after ≥0.30
    separation on gold corpus.
  rationale:
    - "The slopodar is the ultimate labelling function — it stays sovereign"
    - "Autonomous promotion risks compounding model biases into the tool"
    - "Review queue accumulates evidence over time — frequency strengthens signal"
  artifacts:
    - docs/superpowers/specs/2026-04-09-stain-roadmap-design.md

- id: "008"
  date: "2026-04-09"
  title: "Stratified corpus: gold + bulk"
  type: decision
  context: |
    23 labelled samples is too thin for 6+ detectors. Need to scale the
    corpus without sacrificing ground-truth quality.
  decision: |
    Two-tier corpus. Gold tier: hand-curated, operator-labelled, forensically
    clean. Bulk tier: machine-generated synthetic LLM samples (varied model,
    temp, domain) and scraped pre-2020 human text, spot-checked. Gold is the
    final exam — if a detector passes bulk but fails gold, it doesn't ship.
  rationale:
    - "Automated generation for statistical confidence (large n)"
    - "Hand-curation for ground truth (high signal, no contamination)"
    - "Separate tiers prevent bulk noise from polluting promotion decisions"
  artifacts:
    - docs/superpowers/specs/2026-04-09-stain-roadmap-design.md

- id: "009"
  date: "2026-04-09"
  title: "Three cross-cutting concerns: prompts, audit, multi-model"
  type: decision
  context: |
    Three infrastructure requirements emerged during roadmap design that
    apply across all rings and must be built from Ring 1 onward.
  decision: |
    1. Prompt Registry: zero hardcoded prompts. Every LLM call loads from
       versioned prompt.md files. Generic loader, no detector/agent-specific maps.
    2. Audit Logging: every req/res pair logged immutably. Full provenance from
       input to verdict. Enables bias detection, regression hunting, cost tracking.
    3. Multi-Model Validation: promotion decisions validated across ≥2 model
       families (different training lineages). Unanimous for promotions, majority
       for hypotheses, divergence report for research. Burns out mono-cultural
       bias before it bakes into research artifacts.
  rationale:
    - "Prompts are IP — they need versioning, hashing, and history from day one"
    - "Without audit logs, can't diagnose systematic bias or catch regressions"
    - "Single-model analysis risks model priors becoming tool assumptions"
    - "Instrumenting divergence now gives data to answer whether it matters later"
  artifacts:
    - docs/superpowers/specs/2026-04-09-stain-roadmap-design.md
    - stain.config.yaml

- id: "010"
  date: "2026-04-09"
  title: "Jupyter notebooks for research documentation"
  type: decision
  context: |
    Stain is a research instrument as much as a tool. Findings, benchmark
    analyses, detector evaluations, and corpus studies need to be documented
    in a format that combines narrative, code, and visualisation — and that
    can be repurposed into blog posts and presentations later.
  decision: |
    Add a research/ notebooks directory from the start. Jupyter notebooks
    (.ipynb) for benchmark analysis, detector evaluation, corpus studies,
    and discovery findings. Each notebook is a self-contained research note
    that can be exported to blog posts or presentation decks.
  rationale:
    - "Notebooks combine prose + code + charts — natural format for research notes"
    - "nbconvert to markdown/HTML makes blog posts trivial"
    - "RISE or reveal.js export makes presentations from notebooks"
    - "Living documents that re-run against latest data"
    - "Git-tracked alongside the code they analyse"
  artifacts:
    - research/notebooks/
